<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Profile Detector</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <h1>Fake Profile Detector</h1>
    <p class="subtitle">Cybersecurity Heuristic Scanner</p>

    <input id="bio" placeholder="Bio">
    
    <div class="row">
      <input id="followers" placeholder="Followers" type="number">
      <input id="following" placeholder="Following" type="number">
    </div>

    <input id="age" placeholder="Account Age (days)" type="number">

    <label class="checkbox">
      <input type="checkbox" id="dp">
      Profile Picture Available
    </label>

    <button id="analyzeBtn" type="button">Analyze Profile</button>

  </div>
</div>

<script src="css/js/script.js"></script>

</body>
</html>
